upstream auth_backend {
    server auth-service:8081;
}

upstream pay_backend {
    server pay-service:8082;
}

upstream wlt_backend {
    server wlt-service:8084;
}

# HTTP server with API
server {
    listen 80;
    server_name _;
    
    location /health {
        proxy_pass http://auth_backend/health;
        access_log off;
    }

    location /api/payments/health {
        proxy_pass http://pay_backend/health;
        access_log off;
    }

    location /api/wlt/health {
        proxy_pass http://wlt_backend/api/wlt/health;
        access_log off;
    }

    # Общие API routes
    location /api/auth/ {
        proxy_pass http://auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/payments/ {
        proxy_pass http://pay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/wlt/ {
        proxy_pass http://wlt_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback
    location / {
        return 200 "Lumia API is running\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 443 ssl;
    server_name lumia-system.ru www.lumia-system.ru;

    ssl_certificate /etc/nginx/ssl/live/lumia-system.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/lumia-system.ru/privkey.pem;

    location /api/wlt/health {
        proxy_pass http://wlt_backend/api/wlt/health;
        access_log off;
    }

    location /api/auth/ {
        proxy_pass http://auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/payments/ {
        proxy_pass http://pay_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/wlt/ {
        proxy_pass http://wlt_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 200 "Lumia API is running\n";
        add_header Content-Type text/plain;
    }
}