user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Лимиты для rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=50r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    upstream auth_backend {
        server auth-service:8081;
    }

    upstream wallet_backend {
        server wlt-service:8084;
    }

    upstream payment_backend {
        server pay-service:8082;
    }

    upstream card_backend {
        server crd-service:8083;
    }

    upstream marketplace_backend {
        server mkt-service:8085;
    }

    server {
        listen 80;
        server_name _;

        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_conn addr 10;
            proxy_pass http://auth_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/wlt/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 20;
            proxy_pass http://wallet_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/pay/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 20;
            proxy_pass http://payment_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/crd/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 20;
            proxy_pass http://card_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/mkt/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn addr 20;
            proxy_pass http://marketplace_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /health {
            access_log off;
            return 200 "ok";
        }

        location /metrics {
            return 403;
        }
    }
}
