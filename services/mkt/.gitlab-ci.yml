stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  SERVICE_NAME: mkt
  IMAGE_NAME: lumia-mkt

# Build stage
build:
  stage: build
  image: docker:27-cli
  services:
    - docker:27-dind
  script:
    - docker build -t ${IMAGE_NAME}:${CI_COMMIT_SHA} .
    - docker save ${IMAGE_NAME}:${CI_COMMIT_SHA} -o ${IMAGE_NAME}.tar
  artifacts:
    paths:
      - ${IMAGE_NAME}.tar
    expire_in: 1 hour
  only:
    refs:
      - main
    changes:
      - services/mkt/**/*
  tags:
    - docker

# Deploy stage
deploy:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H 194.156.118.175 >> ~/.ssh/known_hosts
  script:
    - echo "Deploying ${SERVICE_NAME} service to Kubernetes..."
    - scp ${IMAGE_NAME}.tar root@194.156.118.175:/tmp/
    - ssh root@194.156.118.175 "k3s ctr images import /tmp/${IMAGE_NAME}.tar"
    - echo "Updating deployment..."
    - ssh root@194.156.118.175 "kubectl set image deployment/${SERVICE_NAME}-service ${SERVICE_NAME}-service=${IMAGE_NAME}:${CI_COMMIT_SHA} -n lumia"
    - ssh root@194.156.118.175 "kubectl rollout status deployment/${SERVICE_NAME}-service -n lumia --timeout=2m"
    - echo "${SERVICE_NAME} service deployment complete!"
    - ssh root@194.156.118.175 "kubectl get pods -n lumia -l app=${SERVICE_NAME}-service"
  when: manual
  only:
    - main
  environment:
    name: production
    url: http://lumia-system.ru
  tags:
    - deployment
